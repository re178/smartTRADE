<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RTS Dashboard</title>
  <!-- Bootstrap & Font Awesome (lightweight) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    body { background: #f8f9fa; padding: 20px; }
    .card { margin-bottom: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-header { background: #fff; font-weight: 600; border-bottom: 1px solid #e9ecef; }
    .signal-badge { font-size: 1.1rem; padding: 8px 16px; }
    .price-up { color: #28a745; }
    .price-down { color: #dc3545; }
    .loading { opacity: 0.6; pointer-events: none; }
    #tradesTable td { vertical-align: middle; }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <h1 class="display-6 mb-4"><i class="fas fa-chart-line text-primary"></i> RTS Trading Dashboard</h1>
    </div>
  </div>

  <!-- Account & Prices -->
  <div class="row">
    <div class="col-md-4">
      <div class="card">
        <div class="card-header"><i class="fas fa-user-circle"></i> Account</div>
        <div class="card-body" id="accountInfo"><p class="text-muted">Loading...</p></div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card">
        <div class="card-header"><i class="fas fa-dollar-sign"></i> Balance & Equity</div>
        <div class="card-body" id="balanceInfo"><p class="text-muted">Loading...</p></div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card">
        <div class="card-header"><i class="fas fa-exchange-alt"></i> Prices</div>
        <div class="card-body" id="priceInfo"><p class="text-muted">Loading...</p></div>
      </div>
    </div>
  </div>

  <!-- Signal & Trading -->
  <div class="row">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header"><i class="fas fa-lightbulb"></i> Signal Generator</div>
        <div class="card-body">
          <div class="input-group mb-3">
            <input type="text" id="signalPair" class="form-control" placeholder="Pair e.g. EUR_USD" value="EUR_USD" />
            <button class="btn btn-primary" id="getSignalBtn"><i class="fas fa-search"></i> Get Signal</button>
          </div>
          <div id="signalResult" class="mt-3"><p class="text-muted">Enter a pair and click "Get Signal".</p></div>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card">
        <div class="card-header"><i class="fas fa-rocket"></i> Execute Trade</div>
        <div class="card-body">
          <form id="tradeForm">
            <div class="row">
              <div class="col-6"><label>Pair</label><input type="text" class="form-control" id="tradePair" value="EUR_USD" required /></div>
              <div class="col-6"><label>Side</label>
                <select class="form-select" id="tradeSide">
                  <option value="BUY">BUY</option>
                  <option value="SELL">SELL</option>
                </select>
              </div>
              <div class="col-4 mt-2"><label>Lot Size</label><input type="number" step="0.01" class="form-control" id="tradeLot" value="0.01" required /></div>
              <div class="col-4 mt-2"><label>Stop Loss</label><input type="number" step="0.00001" class="form-control" id="tradeSL" placeholder="Optional" /></div>
              <div class="col-4 mt-2"><label>Take Profit</label><input type="number" step="0.00001" class="form-control" id="tradeTP" placeholder="Optional" /></div>
            </div>
            <button type="submit" class="btn btn-success mt-3 w-100"><i class="fas fa-paper-plane"></i> Place Order</button>
          </form>
          <hr />
          <form id="autoTradeForm">
            <div class="row">
              <div class="col-8"><label>Pair for Auto-Trade</label><input type="text" class="form-control" id="autoPair" value="EUR_USD" required /></div>
              <div class="col-4"><label>Risk %</label><input type="number" step="0.1" class="form-control" id="autoRisk" value="1" required /></div>
            </div>
            <button type="submit" class="btn btn-warning mt-3 w-100"><i class="fas fa-robot"></i> Auto-Trade</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Open Trades -->
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header"><i class="fas fa-list-ul"></i> Open Trades <button class="btn btn-sm btn-outline-primary float-end" id="refreshTrades"><i class="fas fa-sync-alt"></i> Refresh</button></div>
        <div class="card-body" id="openTradesContainer"><p class="text-muted">Loading...</p></div>
      </div>
    </div>
  </div>

  <!-- Trade History -->
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header"><i class="fas fa-history"></i> Trade History <button class="btn btn-sm btn-outline-secondary float-end" id="refreshHistory"><i class="fas fa-sync-alt"></i> Refresh</button></div>
        <div class="card-body table-responsive" id="historyContainer"><p class="text-muted">Loading...</p></div>
      </div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
